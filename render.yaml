services:
  - type: web
    name: notethemood
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /healthz
    envVars:
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
